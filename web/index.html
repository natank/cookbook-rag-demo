<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>RAG Lecture Demo</title>
<style>
  :root {
    color-scheme: light dark;
    --bg: #ffffff;
    --fg: #1a1a1a;
    --muted: #666;
    --border: #ddd;
    --accent: #b45309;
    --accent-fg: #ffffff;
    --card: #f7f7f5;
  }
  @media (prefers-color-scheme: dark) {
    :root {
      --bg: #17181a;
      --fg: #e8e6e3;
      --muted: #9a9a9a;
      --border: #34363a;
      --accent: #d99a4e;
      --accent-fg: #1a1a1a;
      --card: #202225;
    }
  }
  * { box-sizing: border-box; }
  body {
    margin: 0;
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
    background: var(--bg);
    color: var(--fg);
    display: flex;
    justify-content: center;
    padding: 2.5rem 1rem;
  }
  main { width: 100%; max-width: 640px; }
  h1 { font-size: 1.4rem; margin: 0 0 0.25rem; }
  p.subtitle { color: var(--muted); margin: 0 0 2rem; font-size: 0.9rem; }
  .row { display: flex; gap: 0.5rem; }
  input[type=text] {
    flex: 1;
    padding: 0.6rem 0.8rem;
    border: 1px solid var(--border);
    border-radius: 6px;
    background: var(--bg);
    color: var(--fg);
    font-size: 1rem;
  }
  button {
    padding: 0.6rem 1rem;
    border: none;
    border-radius: 6px;
    background: var(--accent);
    color: var(--accent-fg);
    font-size: 0.95rem;
    cursor: pointer;
  }
  button:disabled { opacity: 0.5; cursor: default; }
  button.secondary {
    background: transparent;
    border: 1px solid var(--border);
    color: var(--fg);
  }
  .ingest-row { margin-bottom: 2rem; display: flex; align-items: center; gap: 0.75rem; }
  #ingestStatus { font-size: 0.85rem; color: var(--muted); }
  #result { margin-top: 1.5rem; }
  .answer {
    background: var(--card);
    border: 1px solid var(--border);
    border-radius: 8px;
    padding: 1rem 1.2rem;
    white-space: pre-wrap;
    line-height: 1.5;
  }
  .sources { margin-top: 0.8rem; font-size: 0.85rem; color: var(--muted); }
  .error { color: #c0392b; }
  .hidden { display: none; }
</style>
</head>
<body>
<main>
  <h1>RAG Lecture Demo</h1>
  <p class="subtitle">Ask questions grounded in The-Cookbook recipes.</p>

  <div class="ingest-row">
    <button id="ingestBtn" class="secondary">Ingest / Rebuild index</button>
    <span id="ingestStatus"></span>
  </div>

  <form id="askForm" class="row">
    <input type="text" id="question" placeholder="e.g. how do I cook a duck breast?" autocomplete="off">
    <button type="submit" id="askBtn">Ask</button>
  </form>

  <div id="result"></div>
</main>

<script>
const ingestBtn = document.getElementById("ingestBtn");
const ingestStatus = document.getElementById("ingestStatus");
const askForm = document.getElementById("askForm");
const askBtn = document.getElementById("askBtn");
const questionInput = document.getElementById("question");
const resultEl = document.getElementById("result");

ingestBtn.addEventListener("click", async () => {
  ingestBtn.disabled = true;
  ingestStatus.textContent = "Ingesting… this can take a moment.";
  ingestStatus.classList.remove("error");
  try {
    const res = await fetch("/api/ingest", { method: "POST" });
    if (!res.ok) throw new Error(`Request failed (${res.status})`);
    const data = await res.json();
    ingestStatus.textContent = `Indexed ${data.count} recipes.`;
  } catch (err) {
    ingestStatus.textContent = `Ingest failed: ${err.message}`;
    ingestStatus.classList.add("error");
  } finally {
    ingestBtn.disabled = false;
  }
});

askForm.addEventListener("submit", async (e) => {
  e.preventDefault();
  const question = questionInput.value.trim();
  if (!question) return;

  askBtn.disabled = true;
  resultEl.innerHTML = `<p class="subtitle">Thinking…</p>`;
  try {
    const res = await fetch("/api/ask", {
      method: "POST",
      headers: { "Content-Type": "application/json" },
      body: JSON.stringify({ question }),
    });
    if (!res.ok) {
      const data = await res.json().catch(() => ({}));
      throw new Error(data.detail || `Request failed (${res.status})`);
    }
    const data = await res.json();
    const sources = data.sources
      .map((s) => `${s.title} (${s.filename})`)
      .join(", ");
    resultEl.innerHTML = `
      <div class="answer">${escapeHtml(data.answer)}</div>
      <div class="sources">Sources: ${escapeHtml(sources)}</div>
    `;
  } catch (err) {
    resultEl.innerHTML = `<p class="error">${escapeHtml(err.message)}</p>`;
  } finally {
    askBtn.disabled = false;
  }
});

function escapeHtml(str) {
  const div = document.createElement("div");
  div.textContent = str;
  return div.innerHTML;
}
</script>
</body>
</html>
